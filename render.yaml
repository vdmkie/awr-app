services:
  - type: web
    name: awr-api
    env: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: awr-db
          property: connectionString
      - key: SECRET_KEY
        value: supersecret
  - type: web
    name: awr-web
    env: docker
    plan: free
    dockerfilePath: ./apps/web/Dockerfile
    buildCommand: ""
    startCommand: ""
  - type: worker
    name: awr-bot
    env: docker
    plan: free
    dockerfilePath: ./apps/bot/Dockerfile
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: awr-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        value: https://awr-web.onrender.com

databases:
  - name: awr-db
    plan: free
